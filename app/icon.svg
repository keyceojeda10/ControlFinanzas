<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="8" fill="#f5c518"/>
  <!-- Abstract "C" shape formed by ascending bars suggesting growth -->
  <g stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Three ascending bars (growth chart) arranged to hint at "C" -->
    <rect x="12" y="28" width="5" height="8" rx="1.5" fill="#0a0a0a" stroke="none"/>
    <rect x="21.5" y="22" width="5" height="14" rx="1.5" fill="#0a0a0a" stroke="none"/>
    <rect x="31" y="14" width="5" height="22" rx="1.5" fill="#0a0a0a" stroke="none"/>
    <!-- Curved arrow suggesting flow/growth connecting the bars -->
    <path d="M14.5 24 C14.5 16, 24 12, 33.5 12" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
    <path d="M30.5 9.5 L33.5 12 L30.5 14.5" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  </g>
</svg>
